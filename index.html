<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gmail·Claude Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0f0f13;
      color: #e8e6f0;
      font-family: 'Inter', system-ui, sans-serif;
    }
    button { font-family: inherit; cursor: pointer; }
    input { font-family: inherit; }

    /* Header */
    #header {
      padding: 20px 24px 0;
      border-bottom: 1px solid #1e1c2a;
      display: flex;
      align-items: center;
      gap: 16px;
      background: #13111e;
    }
    #logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: #a78bfa; }
    #logo span { color: #fff; }
    #nav-spacer { flex: 1; }
    .nav-btn {
      background: none;
      border: 1px solid transparent;
      color: #6b6880;
      padding: 8px 16px;
      border-radius: 8px 8px 0 0;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: -1px;
    }
    .nav-btn.active {
      background: #2d1f5e;
      border-color: #7c3aed44;
      color: #c4b5fd;
    }

    /* Main content */
    #content { padding: 24px; max-width: 900px; margin: 0 auto; }

    /* Stats bar */
    #stats-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-chip {
      background: #1a1826;
      border-radius: 10px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .stat-chip .stat-val { font-size: 22px; font-weight: 800; }
    .stat-chip .stat-lbl { font-size: 12px; color: #7c7a99; }

    /* Section header */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .section-title { font-size: 18px; font-weight: 700; color: #e8e6f0; }

    /* Add button */
    .add-btn {
      background: #4c1d95;
      border: none;
      color: #e9d5ff;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
    }

    /* Cards grid */
    #accounts-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    }
    .account-card {
      background: #1a1826;
      border-radius: 12px;
      padding: 16px;
      position: relative;
      border: 1px solid #2d2b3d;
    }
    .card-status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .status-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .card-spacer { flex: 1; }
    .delete-btn {
      background: none; border: none;
      color: #4b4866;
      font-size: 14px;
      padding: 0 4px;
    }
    .card-email { font-size: 15px; font-weight: 600; margin-bottom: 4px; word-break: break-all; }
    .card-notes { font-size: 12px; color: #7c7a99; margin-bottom: 8px; }
    .project-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #2d1f5e;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      color: #c4b5fd;
      margin-bottom: 8px;
    }
    .timer-box {
      background: #1f1a2e;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
      text-align: center;
    }
    .timer-sublabel { font-size: 11px; color: #7c7a99; margin-bottom: 2px; }
    .timer-display {
      font-size: 22px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #f59e0b;
      letter-spacing: 2px;
    }
    .progress-track { height: 4px; background: #2d2b3d; border-radius: 2px; margin-top: 6px; }
    .progress-fill { height: 100%; border-radius: 2px; transition: width 1s linear; }
    .card-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .action-btn {
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 10px;
      border-width: 1px;
      border-style: solid;
    }

    /* Projects */
    #projects-grid { display: grid; gap: 14px; }
    .project-card {
      background: #1a1826;
      border: 1px solid #2d2b3d;
      border-radius: 12px;
      padding: 18px;
    }
    .project-card.completed { opacity: 0.65; border-color: #22c55e33; }
    .project-inner { display: flex; align-items: flex-start; gap: 12px; }
    .project-body { flex: 1; }
    .project-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .project-name { font-size: 16px; font-weight: 700; }
    .completed-badge {
      font-size: 11px; color: #22c55e;
      background: #052e16;
      padding: 2px 8px; border-radius: 20px; font-weight: 600;
    }
    .project-desc { font-size: 13px; color: #7c7a99; margin-bottom: 10px; }
    .project-stats { display: flex; gap: 16px; margin-bottom: 12px; }
    .stat-block .stat-val2 { font-size: 20px; font-weight: 800; }
    .stat-block .stat-lbl2 { font-size: 11px; color: #7c7a99; }
    .account-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .account-chip {
      background: #0f0f18;
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 5px;
      border-width: 1px;
      border-style: solid;
    }
    .chip-dot { width: 6px; height: 6px; border-radius: 50%; }
    .complete-btn {
      background: #052e16;
      border: 1px solid #22c55e44;
      border-radius: 8px;
      color: #22c55e;
      padding: 6px 12px;
      font-size: 12px;
      white-space: nowrap;
      font-weight: 600;
    }

    /* Project progress */
    .project-progress-block { margin-bottom: 12px; }
    .project-progress-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .progress-label { font-size: 11px; color: #7c7a99; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .progress-pct { font-size: 13px; font-weight: 800; color: #a78bfa; }
    .mini-edit-btn {
      background: none; border: none; color: #6b6880;
      font-size: 11px; cursor: pointer; padding: 0;
      font-family: inherit; margin-left: auto;
      display: flex; align-items: center; gap: 3px;
    }
    .mini-edit-btn:hover { color: #a78bfa; }
    .project-progress-track { height: 6px; background: #2d2b3d; border-radius: 3px; overflow: hidden; }
    .project-progress-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #a78bfa); border-radius: 3px; transition: width .3s ease; }

    /* Checklist / observaciones */
    .checklist-block { margin-bottom: 12px; }
    .checklist-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 8px; }
    .checklist-title { font-size: 12px; color: #a09ec0; font-weight: 600; }
    .checklist-add-btn {
      background: #2d1f5e; border: 1px solid #7c3aed44;
      color: #c4b5fd; font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 6px; white-space: nowrap;
    }
    .checklist-list { display: flex; flex-direction: column; gap: 6px; }
    .checklist-item {
      display: flex; align-items: center; gap: 8px;
      background: #13111e; border: 1px solid #2d2b3d;
      border-radius: 8px; padding: 6px 10px;
    }
    .checklist-item.done .checklist-text { color: #6b6880; text-decoration: line-through; }
    .checklist-checkbox { width: 15px; height: 15px; accent-color: #7c3aed; cursor: pointer; flex-shrink: 0; }
    .checklist-text { flex: 1; font-size: 12.5px; color: #e8e6f0; word-break: break-word; }
    .checklist-icon-btn {
      background: none; border: none; color: #6b6880;
      font-size: 11px; cursor: pointer; padding: 2px;
      font-family: inherit; flex-shrink: 0;
    }
    .checklist-icon-btn:hover { color: #a78bfa; }
    .checklist-empty { font-size: 12px; color: #4b4866; padding: 4px 0 0; }

    /* Empty state */
    .empty { text-align: center; color: #4b4866; padding: 48px 24px; font-size: 14px; }

    /* Settings panel */
    #settings-bar {
      background: #13111e;
      border: 1px solid #2d2b3d;
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    #settings-bar .settings-label {
      font-size: 12px; color: #7c7a99; font-weight: 600; white-space: nowrap;
    }
    #settings-bar .settings-group {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .time-input-group {
      display: flex; align-items: center; gap: 4px;
    }
    .time-input-group input {
      width: 52px;
      background: #1f1a2e;
      border: 1px solid #2d2b3d;
      border-radius: 6px;
      color: #e8e6f0;
      font-size: 13px;
      font-family: inherit;
      padding: 4px 8px;
      text-align: center;
      outline: none;
    }
    .time-input-group input:focus { border-color: #7c3aed; }
    .time-input-group .time-sep { color: #4b4866; font-size: 13px; font-weight: 700; }
    .time-input-group .time-unit { font-size: 11px; color: #6b6880; }
    .apply-time-btn {
      background: #4c1d95; border: none;
      color: #e9d5ff; padding: 5px 12px;
      border-radius: 6px; font-size: 12px; font-weight: 600;
    }
    .settings-sep { width: 1px; height: 28px; background: #2d2b3d; }

    /* Import/Export/Drive buttons */
    .io-btn {
      display: inline-flex; align-items: center; gap: 6px;
      border-radius: 7px; font-size: 12px; font-weight: 600;
      padding: 5px 12px; border-width: 1px; border-style: solid;
      cursor: pointer; font-family: inherit;
    }
    .export-btn { background: #0f2a1a; border-color: #22c55e44; color: #22c55e; }
    .import-btn { background: #1a1826; border-color: #7c3aed44; color: #a78bfa; }
    .drive-btn  { background: #1a2640; border-color: #3b82f644; color: #60a5fa; }
    #import-file-input { display: none; }

    /* Modal overlay */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: #000000b0;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 16px;
    }
    #modal-overlay.open { display: flex; }
    #modal-box {
      background: #1a1826;
      border: 1px solid #2d2b3d;
      border-radius: 14px;
      padding: 24px;
      width: 100%;
      max-width: 420px;
    }
    #modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }

    /* Fields */
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 12px; color: #a09ec0; margin-bottom: 4px; }
    .field input {
      width: 100%;
      background: #13111e;
      border: 1px solid #2d2b3d;
      border-radius: 8px;
      color: #e8e6f0;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }
    .field input:focus { border-color: #7c3aed; }

    /* Modal buttons */
    .modal-footer { margin-top: 16px; display: flex; gap: 8px; justify-content: flex-end; }
    .cancel-btn {
      background: #1f1a2e; border: 1px solid #2d2b3d;
      color: #7c7a99; padding: 8px 16px;
      border-radius: 8px; font-size: 13px;
    }
    .confirm-btn {
      background: #4c1d95; border: none;
      color: #e9d5ff; padding: 8px 16px;
      border-radius: 8px; font-size: 13px; font-weight: 600;
    }

    /* Project options */
    .project-option {
      background: #13111e;
      border: 1px solid #2d2b3d;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .project-option:hover { border-color: #7c3aed88; }
    .project-option.selected { background: #2d1f5e; border-color: #7c3aed; }
    .project-options-wrapper { display: grid; gap: 8px; }

    /* ── Voice button ── */
    .voice-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 50%;
      background: #2d1f5e; border: 1px solid #7c3aed44;
      color: #c4b5fd; font-size: 14px; cursor: pointer;
      transition: background .2s, box-shadow .2s; flex-shrink: 0;
    }
    .voice-btn:hover { background: #3b2470; }
    .voice-btn.listening {
      background: #7c3aed; border-color: #a78bfa;
      animation: pulse-mic .8s ease-in-out infinite alternate;
    }
    @keyframes pulse-mic { from { box-shadow: 0 0 0 2px #7c3aed44; } to { box-shadow: 0 0 0 10px #7c3aed11; } }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1a1826; border: 1px solid #7c3aed44;
      color: #c4b5fd; font-size: 13px; font-weight: 600;
      padding: 10px 20px; border-radius: 24px;
      box-shadow: 0 4px 24px #0008;
      z-index: 200; opacity: 0; pointer-events: none;
      transition: opacity .25s; white-space: nowrap; max-width: 90vw;
    }
    #toast.show { opacity: 1; }

    /* ── History view ── */
    #view-history { display: none; }
    .history-day {
      margin-bottom: 14px; background: #1a1826;
      border: 1px solid #2d2b3d; border-radius: 12px; overflow: hidden;
    }
    .history-day-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px; cursor: pointer; user-select: none;
    }
    .history-day-header:hover { background: #1f1b30; }
    .history-day-label { font-size: 14px; font-weight: 700; color: #e8e6f0; }
    .history-day-meta { display: flex; align-items: center; gap: 8px; }
    .history-day-count { font-size: 11px; color: #7c7a99; background: #2d2b3d; padding: 2px 8px; border-radius: 12px; }
    .history-day-chevron { color: #7c7a99; font-size: 12px; transition: transform .2s; }
    .history-day.open .history-day-chevron { transform: rotate(90deg); }
    .history-events { display: none; padding: 0 18px 14px; }
    .history-day.open .history-events { display: block; }
    .history-event {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 7px 0; border-bottom: 1px solid #2d2b3d22; font-size: 12.5px;
    }
    .history-event:last-child { border-bottom: none; }
    .h-time { color: #6b6880; min-width: 48px; font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .h-icon { font-size: 13px; flex-shrink: 0; }
    .h-text { color: #b8b5d0; flex: 1; }
    .history-io-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }

    /* ── Voice transcript in modal ── */
    .voice-preview {
      background: #13111e; border: 1px dashed #7c3aed44;
      border-radius: 8px; padding: 8px 12px; font-size: 13px;
      color: #a78bfa; min-height: 36px; margin-bottom: 8px; font-style: italic;
    }
    .modal-voice-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  </style>
</head>
<body>
<div id="toast"></div>

<!-- Header -->
<div id="header">
  <div id="logo">Gmail<span>·Claude</span></div>
  <div id="nav-spacer"></div>
  <button class="nav-btn active" id="btn-accounts" onclick="setView('accounts')">Cuentas (<span id="count-accounts">0</span>)</button>
  <button class="nav-btn" id="btn-projects" onclick="setView('projects')">Proyectos (<span id="count-projects">0</span>)</button>
  <button class="nav-btn" id="btn-history" onclick="setView('history')">Historial</button>
</div>

<!-- Main content -->
<div id="content">
  <!-- Accounts view -->
  <div id="view-accounts">
    <div class="section-header">
      <div class="section-title">Mis cuentas Gmail</div>
      <button class="add-btn" onclick="openModal('addAccount')">+ Agregar cuenta</button>
    </div>

    <!-- Settings bar -->
    <div id="settings-bar">
      <span class="settings-label">⏱ Tiempo de recarga</span>
      <div class="settings-group">
        <div class="time-input-group">
          <input type="number" id="cfg-hours" min="0" max="23" value="5" />
          <span class="time-unit">h</span>
          <span class="time-sep">:</span>
          <input type="number" id="cfg-minutes" min="0" max="59" value="0" />
          <span class="time-unit">m</span>
        </div>
        <button class="apply-time-btn" onclick="applyRechargeTime()">Aplicar</button>
        <button class="voice-btn" id="mic-time" onclick="startVoice('time')" title="Dictar tiempo de recarga">🎙</button>
      </div>
      <div class="settings-sep"></div>
      <span class="settings-label">💾 Historial</span>
      <div class="settings-group">
        <button class="io-btn export-btn" onclick="exportHistory()">⬇ Exportar</button>
        <button class="io-btn import-btn" onclick="document.getElementById('import-file-input').click()">⬆ Importar</button>
        <input type="file" id="import-file-input" accept=".json" onchange="importHistory(event)" />
        <button class="io-btn drive-btn" onclick="exportToDrive()" title="Descarga un respaldo con fecha y hora, y abre la carpeta de Drive">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
            <path d="M4.5 20L1 14l7-12h8l7 12-3.5 6z" fill="#4285F4" opacity=".8"/>
            <path d="M12 2l7 12H5z" fill="#34A853" opacity=".8"/>
            <path d="M1 14h22L19 20H5z" fill="#FBBC04" opacity=".9"/>
          </svg>
          Drive
        </button>
      </div>
    </div>

    <div id="stats-bar"></div>
    <div id="accounts-grid"></div>
  </div>

  <!-- Projects view -->
  <div id="view-projects" style="display:none">
    <div class="section-header">
      <div class="section-title">Proyectos</div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="voice-btn" id="mic-project" onclick="startVoice('project')" title="Dictar nombre de proyecto">🎙</button>
        <button class="add-btn" onclick="openModal('addProject')">+ Nuevo proyecto</button>
      </div>
    </div>
    <div id="projects-grid"></div>
  </div>

  <!-- History view -->
  <div id="view-history" style="display:none">
    <div class="section-header">
      <div class="section-title">Historial — últimos 7 días</div>
    </div>
    <div class="history-io-row">
      <button class="io-btn export-btn" onclick="exportHistory()">⬇ Exportar JSON</button>
      <button class="io-btn import-btn" onclick="document.getElementById('import-file-input2').click()">⬆ Importar JSON</button>
      <input type="file" id="import-file-input2" accept=".json" style="display:none" onchange="importHistory(event)" />
      <button class="io-btn drive-btn" onclick="exportToDrive()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
          <path d="M4.5 20L1 14l7-12h8l7 12-3.5 6z" fill="#4285F4" opacity=".8"/>
          <path d="M12 2l7 12H5z" fill="#34A853" opacity=".8"/>
          <path d="M1 14h22L19 20H5z" fill="#FBBC04" opacity=".9"/>
        </svg>
        Drive
      </button>
    </div>
    <div id="history-grid"></div>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay" onclick="handleOverlayClick(event)">
  <div id="modal-box">
    <div id="modal-title"></div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const STORAGE_KEY = "gcm_data_v2";
const CFG_KEY = "gcm_config_v1";
let RECHARGE_MS = (function(){ try { return JSON.parse(localStorage.getItem(CFG_KEY)||"{}").rechargeMs || (5*60*60*1000); } catch { return 5*60*60*1000; } })();

function saveConfig() {
  try { localStorage.setItem(CFG_KEY, JSON.stringify({ rechargeMs: RECHARGE_MS })); } catch {}
}

function applyRechargeTime() {
  const h = parseInt(document.getElementById("cfg-hours").value) || 0;
  const m = parseInt(document.getElementById("cfg-minutes").value) || 0;
  const newMs = (h * 3600 + m * 60) * 1000;
  if (newMs < 60000) { alert("El tiempo mínimo es 1 minuto."); return; }
  RECHARGE_MS = newMs;
  saveConfig();
  render();
}

function buildExportPayload() {
  const d = new Date();
  const pad = n => String(n).padStart(2, "0");
  const stamp = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}-${pad(d.getMinutes())}-${pad(d.getSeconds())}`;
  const filename = `gcm_historial_${stamp}.json`;
  const payload = { exportedAt: d.toISOString(), rechargeMs: RECHARGE_MS, ...state };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  return { blob, filename };
}

function downloadBlob(blob, filename) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function exportHistory() {
  const { blob, filename } = buildExportPayload();
  downloadBlob(blob, filename);
}

function exportToDrive() {
  // Descarga un respaldo con fecha y hora, luego abre la carpeta de Drive para subirlo.
  const { blob, filename } = buildExportPayload();
  downloadBlob(blob, filename);
  window.open("https://drive.google.com/drive/folders/17BS-hn6Shf-jbDhky3h18T24iFCbhGKN?usp=drive_link", "_blank");
}

function importHistory(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.accounts || !data.projects) { alert("Archivo inválido: faltan cuentas o proyectos."); return; }
      if (!confirm(`¿Importar historial de ${file.name}?\nEsto reemplazará los datos actuales.`)) return;
      const { exportedAt, rechargeMs, ...rest } = data;
      state = rest;
      if (rechargeMs) {
        RECHARGE_MS = rechargeMs;
        saveConfig();
        const h = Math.floor(rechargeMs / 3600000);
        const m = Math.floor((rechargeMs % 3600000) / 60000);
        document.getElementById("cfg-hours").value = h;
        document.getElementById("cfg-minutes").value = m;
      }
      commit();
    } catch { alert("Error al leer el archivo JSON."); }
  };
  reader.readAsText(file);
  event.target.value = "";
}
const STATUS_COLORS = {
  available: "#22c55e",
  charging: "#f59e0b",
  delegated: "#8b5cf6",
  inactive: "#6b7280",
};
const STATUS_LABELS = {
  available: "Disponible",
  charging: "Recargando",
  inactive: "Inactiva",
  delegated: "Delegada",
};

// ─── State ────────────────────────────────────────────────────────────────────
let state = loadData() || defaultState();
let currentView = "accounts";
let tickInterval = null;
let notified = new Set();

function defaultState() {
  return { accounts: [], projects: [], nextAccountId: 1, nextProjectId: 1 };
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function now() { return Date.now(); }

function msToHMS(ms) {
  if (ms <= 0) return "00:00:00";
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return [h, m, sec].map(n => String(n).padStart(2, "0")).join(":");
}

function getAccountStatus(acc) {
  if (acc.status === "charging" && acc.chargeStarted) {
    const elapsed = now() - acc.chargeStarted;
    if (elapsed >= RECHARGE_MS) return "available";
  }
  return acc.status;
}

function getTimeLeft(acc) {
  if (acc.status !== "charging" || !acc.chargeStarted) return null;
  return Math.max(0, RECHARGE_MS - (now() - acc.chargeStarted));
}

// ─── Notifications ────────────────────────────────────────────────────────────
function requestNotificationPermission() {
  if ("Notification" in window && Notification.permission === "default") {
    Notification.requestPermission();
  }
}

function sendNotification(title, body) {
  if ("Notification" in window && Notification.permission === "granted") {
    new Notification(title, { body, icon: "https://www.google.com/favicon.ico" });
  }
}

// ─── Actions ─────────────────────────────────────────────────────────────────
function addAccount(email, notes) {
  state.accounts.push({
    id: state.nextAccountId++,
    email, notes,
    status: "available",
    chargeStarted: null,
    projectId: null,
    history: [],
  });
  commit();
}

function deleteAccount(id) {
  state.accounts = state.accounts.filter(a => a.id !== id);
  commit();
}

function startCharging(id) {
  notified.delete(id);
  state.accounts = state.accounts.map(a => a.id !== id ? a : {
    ...a, status: "charging", chargeStarted: now(),
    history: [...(a.history || []), { event: "Empezó recarga", time: now() }],
  });
  commit();
}

function markAvailable(id) {
  state.accounts = state.accounts.map(a => a.id !== id ? a : {
    ...a, status: "available", chargeStarted: null,
  });
  commit();
}

function markInactive(id) {
  state.accounts = state.accounts.map(a => a.id !== id ? a : {
    ...a, status: "inactive",
  });
  commit();
}

function assignProject(accountId, projectId) {
  state.accounts = state.accounts.map(a => a.id !== accountId ? a : {
    ...a, projectId: projectId || null,
    history: [...(a.history || []), {
      event: projectId ? `Asignada a proyecto #${projectId}` : "Removida de proyecto",
      time: now(),
    }],
  });
  commit();
}

function addProject(name, description) {
  state.projects.push({
    id: state.nextProjectId++,
    name, description,
    createdAt: now(),
    status: "active",
    completion: 0,
    checklist: [],
    nextChecklistId: 1,
  });
  commit();
}

function delegateProject(fromAccountId, toAccountId, projectId) {
  state.accounts = state.accounts.map(a => {
    if (a.id === fromAccountId) return {
      ...a, projectId: null, status: "charging", chargeStarted: now(),
      history: [...(a.history || []), {
        event: `Delegó proyecto #${projectId} → cuenta #${toAccountId}`, time: now(),
      }],
    };
    if (a.id === toAccountId) return {
      ...a, projectId,
      history: [...(a.history || []), {
        event: `Recibió proyecto #${projectId} delegado`, time: now(),
      }],
    };
    return a;
  });
  commit();
}

function completeProject(id) {
  state.projects = state.projects.map(p => p.id !== id ? p : {
    ...p, status: "completed", completedAt: now(),
  });
  state.accounts = state.accounts.map(a => a.projectId === id ? { ...a, projectId: null } : a);
  commit();
}

function setProjectCompletion(projectId, value) {
  let val = parseInt(value);
  if (isNaN(val)) val = 0;
  val = Math.max(0, Math.min(100, val));
  state.projects = state.projects.map(p => p.id !== projectId ? p : { ...p, completion: val });
  commit();
}

function addChecklistItem(projectId, text) {
  state.projects = state.projects.map(p => {
    if (p.id !== projectId) return p;
    const checklist = p.checklist || [];
    const nextChecklistId = p.nextChecklistId || 1;
    return {
      ...p,
      checklist: [...checklist, { id: nextChecklistId, text, done: false }],
      nextChecklistId: nextChecklistId + 1,
    };
  });
  commit();
}

function toggleChecklistItem(projectId, itemId) {
  state.projects = state.projects.map(p => {
    if (p.id !== projectId) return p;
    return { ...p, checklist: (p.checklist || []).map(i => i.id !== itemId ? i : { ...i, done: !i.done }) };
  });
  commit();
}

function editChecklistItem(projectId, itemId, text) {
  state.projects = state.projects.map(p => {
    if (p.id !== projectId) return p;
    return { ...p, checklist: (p.checklist || []).map(i => i.id !== itemId ? i : { ...i, text }) };
  });
  commit();
}

function deleteChecklistItem(projectId, itemId) {
  state.projects = state.projects.map(p => {
    if (p.id !== projectId) return p;
    return { ...p, checklist: (p.checklist || []).filter(i => i.id !== itemId) };
  });
  commit();
}

function commit() {
  saveData();
  render();
}

// ─── View ─────────────────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById("view-accounts").style.display = v === "accounts" ? "" : "none";
  document.getElementById("view-projects").style.display = v === "projects" ? "" : "none";
  document.getElementById("view-history").style.display  = v === "history"  ? "" : "none";
  document.getElementById("btn-accounts").classList.toggle("active", v === "accounts");
  document.getElementById("btn-projects").classList.toggle("active", v === "projects");
  document.getElementById("btn-history").classList.toggle("active",  v === "history");
  render();
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  document.getElementById("count-accounts").textContent = state.accounts.length;
  document.getElementById("count-projects").textContent = state.projects.filter(p => p.status === "active").length;

  if (currentView === "accounts") renderAccounts();
  else if (currentView === "projects") renderProjects();
  else if (currentView === "history") renderHistory();
}

function renderAccounts() {
  renderStatsBar();
  const grid = document.getElementById("accounts-grid");
  if (state.accounts.length === 0) {
    grid.innerHTML = `<div class="empty">Agrega tu primera cuenta Gmail para empezar a rastrear la actividad en Claude.</div>`;
    return;
  }
  grid.innerHTML = state.accounts.map(acc => accountCard(acc)).join("");
}

function renderStatsBar() {
  const counts = { available: 0, charging: 0, inactive: 0 };
  state.accounts.forEach(a => {
    const s = getAccountStatus(a);
    if (s in counts) counts[s]++;
  });
  const items = [
    { label: "Disponibles", value: counts.available, color: "#22c55e" },
    { label: "Recargando", value: counts.charging, color: "#f59e0b" },
    { label: "Inactivas", value: counts.inactive, color: "#6b7280" },
  ];
  document.getElementById("stats-bar").innerHTML = items.map(s => `
    <div class="stat-chip" style="border: 1px solid ${s.color}33">
      <div class="stat-val" style="color:${s.color}">${s.value}</div>
      <div class="stat-lbl">${s.label}</div>
    </div>
  `).join("");
}

    <div class="timer-box">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
        <div class="timer-sublabel">Tiempo restante</div>

  if (status === "available")
    actions += `<button class="action-btn" style="color:${STATUS_COLORS.charging};background:${STATUS_COLORS.charging}18;border-color:${STATUS_COLORS.charging}44" onclick="startCharging(${acc.id})">⚡ Recargar</button>`;

    actions += `<button class="action-btn" style="color:${STATUS_COLORS.available};background:${STATUS_COLORS.available}18;border-color:${STATUS_COLORS.available}44" onclick="markAvailable(${acc.id})">✓ Marcar lista</button>`;

  if (status === "inactive")

  actions += `<button class="action-btn" style="color:#8b5cf6;background:#8b5cf618;border-color:#8b5cf644" onclick="openAssignProject(${acc.id})">${acc.projectId ? "Cambiar proyecto" : "Asignar proyecto"}</button>`;

// ─── History view ─────────────────────────────────────────────────────────────
function renderHistory() {
  const grid = document.getElementById("history-grid");
  const now7 = Date.now();
  const sevenDaysAgo = now7 - 7 * 24 * 60 * 60 * 1000;

  // Collect all events
  const allEvents = [];

  state.accounts.forEach(acc => {
    (acc.history || []).forEach(h => {
      if (h.time >= sevenDaysAgo) {
        const icon = h.event.includes("recarga") ? "⚡" :
                     h.event.includes("Delegó") ? "🔄" :
                     h.event.includes("Recibió") ? "📥" :
                     h.event.includes("proyecto") ? "📁" : "📋";
        allEvents.push({ time: h.time, icon, text: h.event, source: acc.email.split("@")[0] });
      }
    });
  });

  state.projects.forEach(proj => {
    if (proj.createdAt >= sevenDaysAgo)
      allEvents.push({ time: proj.createdAt, icon: "🆕", text: `Proyecto creado: "${proj.name}"`, source: "Proyectos" });
    if (proj.completedAt && proj.completedAt >= sevenDaysAgo)
      allEvents.push({ time: proj.completedAt, icon: "✅", text: `Proyecto completado: "${proj.name}"`, source: "Proyectos" });
  });

  if (allEvents.length === 0) {
    grid.innerHTML = `<div class="empty">No hay actividad registrada en los últimos 7 días.</div>`;
    return;
  }

  // Group by day
  const byDay = {};
  allEvents.forEach(ev => {
    const d = new Date(ev.time);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    if (!byDay[key]) byDay[key] = [];
    byDay[key].push(ev);
  });

  // Sort days desc
  const dayKeys = Object.keys(byDay).sort((a,b) => b.localeCompare(a));

  const todayKey = (()=>{ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; })();
  const yesterKey = (()=>{ const d=new Date(Date.now()-86400000); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; })();

  grid.innerHTML = dayKeys.map((key, idx) => {
    const events = byDay[key].sort((a,b) => b.time - a.time);
    const label = key === todayKey ? "Hoy" : key === yesterKey ? "Ayer" : (() => {
      const [y,m,d] = key.split("-");
      return new Date(+y,+m-1,+d).toLocaleDateString("es", { weekday:"long", day:"numeric", month:"long" });
    })();

    const evHtml = events.map(ev => {
      const d = new Date(ev.time);
      const hm = `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
      return `<div class="history-event">
        <span class="h-time">${hm}</span>
        <span class="h-icon">${ev.icon}</span>
        <span class="h-text">${esc(ev.text)} <span style="color:#6b6880;font-size:11px">(${esc(ev.source)})</span></span>
      </div>`;
    }).join("");

    const isOpen = idx === 0 ? "open" : "";
    return `
      <div class="history-day ${isOpen}" id="hday-${key}">
        <div class="history-day-header" onclick="toggleHistoryDay('${key}')">
          <span class="history-day-label">${label}</span>
          <div class="history-day-meta">
            <span class="history-day-count">${events.length} evento${events.length!==1?"s":""}</span>
            <span class="history-day-chevron">▶</span>
          </div>
        </div>
        <div class="history-events">${evHtml}</div>
      </div>`;
  }).join("");
}

function toggleHistoryDay(key) {
  document.getElementById("hday-" + key).classList.toggle("open");
}

// ─── Voice recognition ────────────────────────────────────────────────────────
const NUM_WORDS = {
  cero:0,uno:1,una:1,dos:2,tres:3,cuatro:4,cinco:5,seis:6,siete:7,ocho:8,
  nueve:9,diez:10,once:11,doce:12,trece:13,catorce:14,quince:15,
  dieciséis:16,diecisiete:17,dieciocho:18,diecinueve:19,veinte:20,
  veintiuno:21,veintidós:22,veintitrés:23,
};

function wordToNum(w) {
  w = w.toLowerCase().trim();
  if (NUM_WORDS[w] !== undefined) return NUM_WORDS[w];
  const n = parseInt(w);
  return isNaN(n) ? null : n;
}

function parseTimePhrase(text) {
  text = text.toLowerCase()
    .replace(/y media/g, "30 minutos")
    .replace(/y cuarto/g, "15 minutos");
  let h = 0, m = 0;
  const hMatch = text.match(/(\w+)\s*hora[s]?/);
  if (hMatch) {
    const v = wordToNum(hMatch[1]);
    if (v !== null) h = v;
  }
  const mMatch = text.match(/(\w+)\s*minuto[s]?/);
  if (mMatch) {
    const v = wordToNum(mMatch[1]);
    if (v !== null) m = v;
  }
  return (h > 0 || m > 0) ? { h, m } : null;
}

let voiceMode = null; // "time" | "project"
let recognition = null;

function startVoice(mode) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast("🚫 Tu navegador no soporta reconocimiento de voz"); return; }

  if (recognition) { recognition.abort(); recognition = null; }

  voiceMode = mode;
  const micId = mode === "time" ? "mic-time" : "mic-project";
  const micBtn = document.getElementById(micId);

  recognition = new SR();
  recognition.lang = "es-ES";
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    micBtn && micBtn.classList.add("listening");
    toast("🎙 Escuchando… habla ahora");
  };

  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript.trim();
    handleVoiceResult(transcript, mode);
  };

  recognition.onerror = (e) => {
    toast("⚠️ Error de voz: " + e.error);
    micBtn && micBtn.classList.remove("listening");
  };

  recognition.onend = () => {
    micBtn && micBtn.classList.remove("listening");
    recognition = null;
  };

  recognition.start();
}

function handleVoiceResult(transcript, mode) {
  if (mode === "time") {
    const parsed = parseTimePhrase(transcript);
    if (parsed) {
      document.getElementById("cfg-hours").value = parsed.h;
      document.getElementById("cfg-minutes").value = parsed.m;
      toast(`✅ Tiempo: ${parsed.h}h ${parsed.m}m — pulsa "Aplicar" para guardar`);
    } else {
      toast(`🤔 No entendí el tiempo: "${transcript}"`);
    }
  } else if (mode === "project") {
    // Open add-project modal pre-filled with voice transcript
    openModal("addProject", { voiceName: transcript });
    toast(`🎙 "${transcript}" — revisa y confirma`);
  }
}

let toastTimer = null;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 3500);
}

// ─── Modals ───────────────────────────────────────────────────────────────────
let modalState = {};

function openModal(type, extra) {
  modalState = { type, ...extra };
  const overlay = document.getElementById("modal-overlay");
  const title = document.getElementById("modal-title");
  const body = document.getElementById("modal-body");

  if (type === "addAccount") {
    title.textContent = "Agregar cuenta Gmail";
    body.innerHTML = `
      <div class="field"><label>Email Gmail</label><input id="m-email" placeholder="ejemplo@gmail.com" /></div>
      <div class="field"><label>Notas (opcional)</label><input id="m-notes" placeholder="Cuenta secundaria, alias..." /></div>
      <div class="modal-footer">
        <button class="cancel-btn" onclick="closeModal()">Cancelar</button>
        <button class="confirm-btn" onclick="submitAddAccount()">Agregar</button>
      </div>
    `;
  } else if (type === "addProject") {
    const prefill = (extra && extra.voiceName) ? esc(extra.voiceName) : "";
    title.textContent = "Nuevo proyecto";
    body.innerHTML = `
      <div class="field">
        <label>Nombre del proyecto</label>
        <div class="modal-voice-row">
          <input id="m-name" placeholder="Análisis Q2, Campaña X..." value="${prefill}" style="flex:1" />
          <button class="voice-btn" onclick="startVoiceModal('m-name')" title="Dictar nombre">🎙</button>
        </div>
      </div>
      <div class="field">
        <label>Descripción (opcional)</label>
        <div class="modal-voice-row">
          <input id="m-desc" placeholder="Qué se está haciendo..." style="flex:1" />
          <button class="voice-btn" onclick="startVoiceModal('m-desc')" title="Dictar descripción">🎙</button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="cancel-btn" onclick="closeModal()">Cancelar</button>
        <button class="confirm-btn" onclick="submitAddProject()">Crear</button>
      </div>
    `;
  } else if (type === "assignProject") {
    const acc = state.accounts.find(a => a.id === extra.accountId);
    title.textContent = "Asignar proyecto";
    const activeProjects = state.projects.filter(p => p.status === "active");
    const options = [`
      <div class="project-option" onclick="submitAssignProject(null)">
        <span style="color:#6b7280">— Sin proyecto</span>
      </div>
    `];
    activeProjects.forEach(p => {
      const sel = acc?.projectId === p.id ? "selected" : "";
      options.push(`
        <div class="project-option ${sel}" onclick="submitAssignProject(${p.id})">
          <span style="font-weight:600">${esc(p.name)}</span>
          ${p.description ? `<span style="font-size:12px;color:#7c7a99"> — ${esc(p.description)}</span>` : ""}
        </div>
      `);
    });
    const empty = activeProjects.length === 0
      ? `<div style="color:#7c7a99;font-size:13px;text-align:center;padding:12px">No hay proyectos activos. Crea uno primero.</div>` : "";
    body.innerHTML = `
      <div class="project-options-wrapper">${options.join("")}${empty}</div>
      <div class="modal-footer"><button class="cancel-btn" onclick="closeModal()">Cancelar</button></div>
    `;
  } else if (type === "editTimer") {
    const acc = state.accounts.find(a => a.id === extra.accountId);
    const timeLeft = getTimeLeft(acc);
    const remH = timeLeft ? Math.floor(timeLeft / 3600000) : 0;
    const remM = timeLeft ? Math.floor((timeLeft % 3600000) / 60000) : 0;
    const remS = timeLeft ? Math.floor((timeLeft % 60000) / 1000) : 0;
    title.textContent = `Editar recarga — ${esc(acc.email.split("@")[0])}`;
    body.innerHTML = `
      <p style="font-size:12px;color:#7c7a99;margin-bottom:12px">
        Tiempo restante actual: <span style="color:#f59e0b;font-weight:700">${msToHMS(timeLeft)}</span><br>
        Ingresa el nuevo tiempo <strong>restante</strong> para esta cuenta.
      </p>
      <div class="field">
        <label>Tiempo restante</label>
        <div style="display:flex;align-items:center;gap:8px">
          <input id="et-h" type="number" min="0" max="23" value="${remH}" style="width:64px;text-align:center" />
          <span style="color:#4b4866;font-weight:700">h</span>
          <input id="et-m" type="number" min="0" max="59" value="${remM}" style="width:64px;text-align:center" />
          <span style="color:#4b4866;font-weight:700">m</span>
          <input id="et-s" type="number" min="0" max="59" value="${remS}" style="width:64px;text-align:center" />
          <span style="color:#4b4866;font-weight:700">s</span>
        </div>
      </div>
      <div class="modal-footer">
        <button class="cancel-btn" onclick="closeModal()">Cancelar</button>
        <button class="confirm-btn" onclick="submitEditTimer(${acc.id})">Guardar</button>
      </div>
    `;
  } else if (type === "editProgress") {
    const proj = state.projects.find(p => p.id === extra.projectId);
    const val = proj.completion || 0;
    title.textContent = `Editar avance — ${esc(proj.name)}`;
    body.innerHTML = `
      <div class="field">
        <label>Porcentaje de completado</label>
        <div style="display:flex;align-items:center;gap:12px">
          <input type="range" id="ep-range" min="0" max="100" step="5" value="${val}" style="flex:1" oninput="document.getElementById('ep-num').value=this.value" />
          <input id="ep-num" type="number" min="0" max="100" value="${val}" style="width:64px;text-align:center" oninput="document.getElementById('ep-range').value=this.value" />
          <span style="color:#7c7a99;font-size:13px">%</span>
        </div>
      </div>
      <div class="modal-footer">
        <button class="cancel-btn" onclick="closeModal()">Cancelar</button>
        <button class="confirm-btn" onclick="submitEditProgress(${proj.id})">Guardar</button>
      </div>
    `;
  } else if (type === "addChecklist") {
    const proj = state.projects.find(p => p.id === extra.projectId);
    title.textContent = `Agregar observación — ${esc(proj.name)}`;
    body.innerHTML = `
      <div class="field"><label>Observación</label><input id="m-checklist-text" placeholder="Describe la tarea o nota..." /></div>
      <div class="modal-footer">
        <button class="cancel-btn" onclick="closeModal()">Cancelar</button>
        <button class="confirm-btn" onclick="submitAddChecklist(${proj.id})">Agregar</button>
      </div>
    `;
  } else if (type === "editChecklist") {
    const proj = state.projects.find(p => p.id === extra.projectId);
    const item = (proj.checklist || []).find(i => i.id === extra.itemId);
    title.textContent = "Editar observación";
    body.innerHTML = `
      <div class="field"><label>Observación</label><input id="m-checklist-text" value="${esc(item ? item.text : "")}" /></div>
      <div class="modal-footer">
        <button class="cancel-btn" onclick="closeModal()">Cancelar</button>
        <button class="confirm-btn" onclick="submitEditChecklist(${proj.id}, ${extra.itemId})">Guardar</button>
      </div>
    `;
  } else if (type === "delegate") {
    title.textContent = "Delegar proyecto";
    const available = state.accounts.filter(a => a.id !== extra.fromAccountId && getAccountStatus(a) === "available");
    const options = available.map(a => `
      <div class="project-option" onclick="submitDelegate(${a.id})">
        <span style="color:#22c55e">✓</span>
        <span style="font-weight:600">${esc(a.email)}</span>
      </div>
    `);
    const empty = available.length === 0
      ? `<div style="color:#f87171;font-size:13px;text-align:center;padding:12px">No hay cuentas disponibles para delegar. Espera que alguna termine de recargar.</div>` : "";
    body.innerHTML = `
      <p style="font-size:13px;color:#a09ec0;margin-bottom:12px">
        Selecciona la cuenta que recibirá el proyecto. La cuenta actual entrará en recarga.
      </p>
      <div class="project-options-wrapper">${options.join("")}${empty}</div>
      <div class="modal-footer"><button class="cancel-btn" onclick="closeModal()">Cancelar</button></div>
    `;
  }

  overlay.classList.add("open");
}

function openAssignProject(accountId) { openModal("assignProject", { accountId }); }
function openDelegate(fromAccountId, projectId) { openModal("delegate", { fromAccountId, projectId }); }
function openEditTimer(accountId) { openModal("editTimer", { accountId }); }
function openEditProgress(projectId) { openModal("editProgress", { projectId }); }
function openAddChecklist(projectId) { openModal("addChecklist", { projectId }); }
function openEditChecklist(projectId, itemId) { openModal("editChecklist", { projectId, itemId }); }

// Voice for modal fields
function startVoiceModal(fieldId) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast("🚫 Tu navegador no soporta reconocimiento de voz"); return; }
  const r = new SR();
  r.lang = "es-ES";
  r.interimResults = false;
  r.onstart = () => toast("🎙 Escuchando…");
  r.onresult = (e) => {
    const t = e.results[0][0].transcript.trim();
    const el = document.getElementById(fieldId);
    if (el) { el.value = t; toast(`✅ Capturado: "${t}"`); }
  };
  r.onerror = (e) => toast("⚠️ Error de voz: " + e.error);
  r.start();
}

function submitEditProgress(projectId) {
  setProjectCompletion(projectId, document.getElementById("ep-num").value);
  closeModal();
}

function submitAddChecklist(projectId) {
  const text = document.getElementById("m-checklist-text").value.trim();
  if (!text) return;
  addChecklistItem(projectId, text);
  closeModal();
}

function submitEditChecklist(projectId, itemId) {
  const text = document.getElementById("m-checklist-text").value.trim();
  if (!text) return;
  editChecklistItem(projectId, itemId, text);
  closeModal();
}

function submitEditTimer(accountId) {
  const h = parseInt(document.getElementById("et-h").value) || 0;
  const m = parseInt(document.getElementById("et-m").value) || 0;
  const s = parseInt(document.getElementById("et-s").value) || 0;
  const newTimeLeftMs = (h * 3600 + m * 60 + s) * 1000;
  if (newTimeLeftMs <= 0) { alert("El tiempo debe ser mayor a 0."); return; }
  notified.delete(accountId);
  // Recalculate chargeStarted so that (now - chargeStarted) = RECHARGE_MS - newTimeLeftMs
  const newChargeStarted = now() - (RECHARGE_MS - newTimeLeftMs);
  state.accounts = state.accounts.map(a => a.id !== accountId ? a : {
    ...a,
    chargeStarted: newChargeStarted,
    history: [...(a.history || []), { event: `Tiempo editado manualmente → ${msToHMS(newTimeLeftMs)} restante`, time: now() }],
  });
  commit();
  closeModal();
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
}

function submitAddAccount() {
  const email = document.getElementById("m-email").value.trim();
  if (!email) return;
  const notes = document.getElementById("m-notes").value.trim();
  addAccount(email, notes);
  closeModal();
}

function submitAddProject() {
  const name = document.getElementById("m-name").value.trim();
  if (!name) return;
  const desc = document.getElementById("m-desc").value.trim();
  addProject(name, desc);
  closeModal();
}

function submitAssignProject(projectId) {
  assignProject(modalState.accountId, projectId);
  closeModal();
}

function submitDelegate(toAccountId) {
  delegateProject(modalState.fromAccountId, toAccountId, modalState.projectId);
  closeModal();
}

// ─── Escape helper ────────────────────────────────────────────────────────────
function esc(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ─── Timer tick ───────────────────────────────────────────────────────────────
function tick() {
  // Check for completed recharges
  let changed = false;
  state.accounts.forEach(acc => {
    if (acc.status === "charging" && acc.chargeStarted) {
      const elapsed = now() - acc.chargeStarted;
      if (elapsed >= RECHARGE_MS && !notified.has(acc.id)) {
        notified.add(acc.id);
        sendNotification(
          `✅ ${acc.email} lista`,
          `La cuenta terminó de recargar. Ya puedes usarla en Claude.`
        );
        // Auto-mark available
        acc.status = "available";
        acc.chargeStarted = null;
        changed = true;
      }
    }
  });
  if (changed) saveData();
  render();
}

// ─── Init ─────────────────────────────────────────────────────────────────────
requestNotificationPermission();
// Restore saved recharge time into the UI inputs
(function(){
  const h = Math.floor(RECHARGE_MS / 3600000);
  const m = Math.floor((RECHARGE_MS % 3600000) / 60000);
  document.getElementById("cfg-hours").value = h;
  document.getElementById("cfg-minutes").value = m;
})();
render();
tickInterval = setInterval(tick, 1000);
</script>
